<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" fill="none">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ec4899;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Infinity Symbol -->
  <g filter="url(#glow)">
    <path d="M 100 60
             C 100 30, 160 30, 160 60
             C 160 90, 100 90, 100 60
             M 160 60
             C 160 30, 220 30, 220 60
             C 220 90, 160 90, 160 60"
          stroke="url(#logoGradient)"
          stroke-width="8"
          fill="none"
          stroke-linecap="round"
          stroke-linejoin="round"
          opacity="0.9"/>
  </g>

  <!-- R Letter (integrated with infinity) -->
  <text x="70" y="75"
        font-family="Arial, sans-serif"
        font-size="50"
        font-weight="bold"
        fill="url(#textGradient)"
        opacity="0.95">R</text>

  <!-- T Letter -->
  <text x="235" y="75"
        font-family="Arial, sans-serif"
        font-size="50"
        font-weight="bold"
        fill="url(#textGradient)"
        opacity="0.95">T</text>

  <!-- Decorative dots -->
  <circle cx="260" cy="35" r="4" fill="#a855f7" opacity="0.7"/>
  <circle cx="275" cy="45" r="3" fill="#ec4899" opacity="0.6"/>
  <circle cx="250" cy="50" r="2" fill="#a855f7" opacity="0.5"/>
</svg>
